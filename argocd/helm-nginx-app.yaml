apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-nginx-app
  namespace: gitops

spec:
  project: default

  source:
    repoURL: https://github.com/UyiGodfrey/gitops-project.git
    targetRevision: main
    path: apps/helm-nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true